version: "3.9"

services:
  db:
    image: postgres:15
    container_name: grof_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: grof_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/grof
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
