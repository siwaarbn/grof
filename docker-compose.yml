services:
  db:
    image: postgres:14
    container_name: grof-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: grof
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: grof-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: grof-api
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:admin@db:5432/grof
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  pgadmin:
    image: dpage/pgadmin4
    container_name: grof-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  db_data:
