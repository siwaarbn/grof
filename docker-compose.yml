version: "3.9"
services:
  db:
    container_name: grof-db
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: grof-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://admin:admin@db:5432/grof
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  pgadmin:
    container_name: grof-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  db_data:
